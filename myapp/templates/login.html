{% load static %}
<html>
    <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Classy Cafe</title>
<!--
    
TemplateMo 558 Classy Cafe

https://templatemo.com/tm-558-klassy-cafe

-->
    <!-- Additional CSS Files -->
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">

    <link rel="stylesheet" type="text/css" href="{% static 'css/font-awesome.css' %}">

    <link rel="stylesheet" href="{% static 'css/templatemo-klassy-cafe.css' %}">

    <link rel="stylesheet" href="{% static 'css/owl-carousel.css' %}">

    <link rel="stylesheet" href="{% static 'css/lightbox.css' %}">

    </head>

<body>
    <header class="header-area header-sticky">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <nav class="main-nav">
                        <!-- ***** Logo Start ***** -->
                        <a href="index.html" class="logo">
                            <img src="{% static 'images/klassy-logo.png' %}" align="klassy cafe html template">
                        </a>
                        <!-- ***** Logo End ***** -->
                        <!-- ***** Menu Start ***** -->
                        <ul class="nav">
                            <li class="scroll-to-section"><a href="/">Home</a></li>
                            <li class="scroll-to-section"><a href="#about">About</a></li>
                            <li class="scroll-to-section"><a href="/l/">Login</a></li>
                            <li class="scroll-to-section"><a href="/r/">Register</a></li>
                            <li class="scroll-to-section"><a href="/l/">Menu</a></li>
                             
                            <!-- <li class=""><a rel="sponsored" href="https://templatemo.com" target="_blank">External URL</a></li> -->
                            <li class="scroll-to-section"><a href="#reservation">Contact Us</a></li> 
                        </ul>        
                        <a class='menu-trigger'>
                            <span>Menu</span>
                        </a>
                        <!-- ***** Menu End ***** -->
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <section class="section" id="reservation">
        <div class="container">
            <div class="row">
                <div class="col-lg-6 align-self-center">
                    <div class="left-text-content">
                        <div class="section-heading">
                            <h2>Login to ClassyCafe </h2>  
                            <p>Don't have an account? <a href="/r/">register here</a></p>
                        </div>
                        
                        <div class="row">
                            <div class="col-lg-6">
                                
                            </div>
                            <div class="col-lg-6">
                                
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 offset-lg-3">
                    <div class="contact-form" style="background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                        <form id="contact" action="" method="post">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-lg-12 text-center">
                                    <h4 style="color: #2a2a2a; margin-bottom: 30px;">Login to Your Account</h4>
                                    {% if error %}
                                    <div class="alert alert-danger" style="border-radius: 25px;">{{ error }}</div>
                                    {% endif %}
                                </div>
                                <div class="col-lg-12">
                                    <fieldset>
                                        <input name="uname" type="text" placeholder="Username" required style="border-radius: 25px; padding: 12px 20px;">
                                    </fieldset>
                                </div>
                                <div class="col-lg-12 mt-3">
                                    <fieldset>
                                        <input name="pword" type="password" placeholder="Password" required style="border-radius: 25px; padding: 12px 20px;">
                                    </fieldset>
                                </div>
                                <div class="col-lg-12 text-center mt-4">
                                    <fieldset>
                                        <button type="submit" id="form-submit" class="main-button-icon" style="width: 100%; border-radius: 25px;">Login Now</button>
                                    </fieldset>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
