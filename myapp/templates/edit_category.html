{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Edit Category - Klassy Cafe</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        body { background: #f8f9fa; font-family: 'Poppins', sans-serif; padding-top: 50px; }
        .edit-card { background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        .btn-save { background: #fb5849; color: #fff; border-radius: 25px; padding: 10px 30px; border: none; font-weight: 600; }
        .btn-cancel { border-radius: 25px; padding: 10px 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="edit-card">
            <h2 class="mb-4">Edit Category</h2>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" name="name" class="form-control" value="{{ category.name }}" required>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn-save">Update Category</button>
                    <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
