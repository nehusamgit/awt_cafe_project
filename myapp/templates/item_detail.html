{% load static %}
<!DOCTYPE html>
<html lang="en">

  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Classy Cafe - {{ item.title }}</title>

    <!-- Additional CSS Files -->
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/font-awesome.css' %}">
    <link rel="stylesheet" href="{% static 'css/templatemo-klassy-cafe.css' %}?v=1.3">
    <link rel="stylesheet" href="{% static 'css/owl-carousel.css' %}">
    <link rel="stylesheet" href="{% static 'css/lightbox.css' %}">

    <style>
        .item-detail-container {
            background: #fff;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .item-detail-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .item-title {
            font-family: 'Dancing Script', cursive;
            font-size: 50px;
            color: #2a2a2a;
            margin-bottom: 20px;
        }
        .item-price {
            font-size: 30px;
            color: #fb5849;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .item-desc {
            font-size: 16px;
            color: #777;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .quantity-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .quantity-wrapper label {
            font-weight: 600;
            margin-right: 15px;
            margin-bottom: 0;
        }
        .qty-input {
            width: 80px;
            text-align: center;
            border-radius: 25px;
            border: 2px solid #eee;
            padding: 10px;
            font-weight: 600;
        }
        .qty-input:focus {
            outline: none;
            border-color: #fb5849;
        }
        .btn-add-cart {
            background-color: #fb5849;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 18px;
            border: none;
            transition: 0.3s;
        }
        .btn-add-cart:hover {
            background-color: #d44336;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 88, 73, 0.3);
            color: white;
        }
    </style>

    </head>
    
    <body>
    
    <!-- ***** Preloader Start ***** -->
    <div id="preloader">
        <div class="jumper">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>  
    <!-- ***** Preloader End ***** -->
    
    
    <!-- ***** Header Area Start ***** -->
    <header class="header-area header-sticky">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <nav class="main-nav">
                        <!-- ***** Logo Start ***** -->
                        <a href="{% url 'customer_home' %}" class="logo">
                            <img src="{% static 'images/klassy-logo.png' %}" align="klassy cafe logo">
                        </a>
                        <!-- ***** Logo End ***** -->
                        <ul class="nav">
                            <li class=""><a href="{% url 'customer_home' %}">Home</a></li>
                            <li class=""><a href="{% url 'view_cart' %}">Cart</a></li>
                            <li class=""><a href="/">Logout</a></li>
                        </ul>        
                        <a class='menu-trigger'>
                            <span>Menu</span>
                        </a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div id="top" style="padding-top: 150px; min-height: 80vh; background: #fdfdfd;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="item-detail-container">
                        <div class="row">
                            <div class="col-md-6">
                                {% if item.image %}
                                <img src="{{ item.image.url }}" class="item-detail-img" alt="{{ item.title }}">
                                {% else %}
                                <img src="{% static 'images/tab-item-01.png' %}" class="item-detail-img" alt="Default Image">
                                {% endif %}
                            </div>
                            <div class="col-md-6">
                                <h6 style="color: #fb5849; font-weight: 700; text-transform: uppercase;">{{ item.category.name }}</h6>
                                <h1 class="item-title">{{ item.title }}</h1>
                                <h3 class="item-price">Rs. {{ item.price }}</h3>
                                <p class="item-desc">{{ item.description }}</p>
                                
                                <form action="{% url 'add_to_cart' item.id %}" method="POST">
                                    {% csrf_token %}
                                    <div class="quantity-wrapper">
                                        <label for="quantity">Quantity:</label>
                                        <input type="number" id="quantity" name="quantity" class="qty-input" value="1" min="1" max="20">
                                    </div>
                                    <button type="submit" class="btn-add-cart"><i class="fa fa-shopping-cart"></i> Add to Cart</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ***** Footer Start ***** -->
    <footer>
        <div class="container">
            <div class="row">
                <div class="col-lg-4 col-xs-12">
                    <div class="right-text-content">
                            <ul class="social-icons">
                                <li><a href="#"><i class="fa fa-facebook"></i></a></li>
                                <li><a href="#"><i class="fa fa-twitter"></i></a></li>
                                <li><a href="#"><i class="fa fa-linkedin"></i></a></li>
                                <li><a href="#"><i class="fa fa-instagram"></i></a></li>
                            </ul>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="logo">
                        <a href="index.html"><img src="{% static 'images/white-logo.png' %}" alt=""></a>
                    </div>
                </div>
                <div class="col-lg-4 col-xs-12">
                    <div class="left-text-content">
                        <p>© Copyright Klassy Cafe Co.
                        <br>Design: TemplateMo</p>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- jQuery -->
    <script src="{% static 'js/jquery-2.1.0.min.js' %}"></script>
    <script src="{% static 'js/popper.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/owl-carousel.js' %}"></script>
    <script src="{% static 'js/accordions.js' %}"></script>
    <script src="{% static 'js/datepicker.js' %}"></script>
    <script src="{% static 'js/scrollreveal.min.js' %}"></script>
    <script src="{% static 'js/waypoints.min.js' %}"></script>
    <script src="{% static 'js/jquery.counterup.min.js' %}"></script>
    <script src="{% static 'js/imgfix.min.js' %}"></script> 
    <script src="{% static 'js/slick.js' %}"></script> 
    <script src="{% static 'js/lightbox.js' %}"></script> 
    <script src="{% static 'js/isotope.js' %}"></script> 
    <script src="{% static 'js/custom.js' %}"></script>
  </body>
</html>
